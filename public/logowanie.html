<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="styles.css">
        <link rel="icon" type="image/png" href="LogoNaPasku.png">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
        <link href="https://cdnjs.cloudflare.com/ajax/libs/boxicons/2.0.7/css/boxicons.min.css" rel="stylesheet">

        <link rel="stylesheet" href="hhtps://unpk.com/boxicons@2.1.4/css/boxicons.min.css">
        <title>Login | ChillBill</title>

    </head>
    

<body class="logowanie-body">
    <header>
        <h2 class="logo">
        <img src="Logo.png" alt="logo" width="100" height="100" class="logo-img">   
        
        </h2>

        <nav class="navigation">

            <a href="index.html" class="active">O nas</a>   
            <a href="#">Kontakt</a>
            <a href="logowanie.html">Logowanie</a> 
            <a href="rejestracja.html">Rejestracja</a>

        </nav>
    </header>
    <section class="opis">
        <div class="wrapper">
            <form id="loginForm">
            <div class="logowanie">
                <div class="logowanie-header">
                    <span>Logowanie</span>
                </div>
                <div class="input_box">
                    <input type="text" id="login" class="input-field" required>
                    <label for="login" class="label">Użytkownik</label>
                    <i class="bx bx-user icon"></i>
                </div>
                <div class="input_box">
                    <input type="password" id="haslo" class="input-field" required>
                    <label for="haslo" class="label">Hasło</label>    
                    <i class="bx bx-lock-alt icon"></i>
                </div>
                <div class="remember-forgot">
                    <div class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <label for="remember">Zapamiętaj mnie</label>
                    </div>
                    <div class="forgot-password">
                        <a href="#">Zapomniałeś hasła</a>
                    </div>
                </div>
                <div class="input_box">
                    <input type="submit" value="Zaloguj" class="input-submit">
                </div>
                <div class="register">
                    <span>Nie masz konta? <a href="rejestracja.html">Zarejestruj się</a></span>
                </div>
            </form>
            </div>
        </div>
        <script>
            document.addEventListener("DOMContentLoaded", function () {
                const form = document.getElementById("loginForm");
                const loginInput = document.getElementById("login");
                const rememberMeCheckbox = document.getElementById("rememberMe");
    
                // Sprawdzenie, czy dane są zapisane w localStorage
                if (localStorage.getItem("login")) {
                    loginInput.value = localStorage.getItem("login");
                    rememberMeCheckbox.checked = true;
                }
    
                form.addEventListener("submit", function (event) {
                    event.preventDefault(); // Zatrzymanie domyślnej akcji formularza
    
                    const login = loginInput.value.trim();
                    const haslo = document.getElementById("haslo").value.trim();
    
                    if (rememberMeCheckbox.checked) {
                        localStorage.setItem("login", login);  // Zapisywanie loginu w localStorage
                    } else {
                        localStorage.removeItem("login");  // Usuwanie loginu z localStorage, jeśli checkbox jest niezaznaczony
                    }
    
                    // Wysłanie zapytania do backendu
                    fetch('/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ login, haslo })
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (data.message === "Zalogowano pomyślnie!") {
                            // Jeśli logowanie pomyślne
                            showPopup("Zalogowano pomyślnie!", function () {
                                window.location.href = "index.html";
                            });
                        } else {
                            // Jeśli błąd
                            showPopup(data.error);
                        }
                    })
                    .catch(error => {
                        showPopup("Wystąpił błąd połączenia z serwerem.");
                    });
                });
    
                // Funkcja do wyświetlania popupu
                function showPopup(message, callback) {
                    let popup = document.createElement("div");
                    popup.innerHTML = `
                        <div class="popup-overlay">
                            <div class="popup-content">
                                <p>${message}</p>
                                <button id="closePopup">OK</button>
                            </div>
                        </div>
                    `;
                    document.body.appendChild(popup);
    
                    document.getElementById("closePopup").addEventListener("click", function () {
                        popup.remove();
                        if (callback) callback();
                    });
                }
            });
        </script>  
    </section>
