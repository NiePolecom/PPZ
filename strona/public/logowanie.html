<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie</title>
    <style>
        /* Stylizacja formularza (jak wcześniej) */
        body {
            font-family: Arial, sans-serif;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
        }
        .form-group input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        .form-group button {
            width: 100%;
            padding: 10px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .form-group button:hover {
            background-color: #0056b3;
        }
        /* Popup style */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .popup-content {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        #closePopup {
            padding: 10px 20px;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Logowanie</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="login">Nazwa użytkownika</label>
                <input type="text" id="login" name="login" required>
            </div>
            <div class="form-group">
                <label for="haslo">Hasło</label>
                <input type="password" id="haslo" name="haslo" required>
            </div>
            <div class="form-group">
                <label>
                    <input type="checkbox" id="rememberMe"> Zapamiętaj mnie
                </label>
            </div>
            <div class="form-group">
                <button type="submit">Zaloguj się</button>
            </div>
        </form>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const form = document.getElementById("loginForm");
            const loginInput = document.getElementById("login");
            const rememberMeCheckbox = document.getElementById("rememberMe");

            // Sprawdzenie, czy dane są zapisane w localStorage
            if (localStorage.getItem("login")) {
                loginInput.value = localStorage.getItem("login");
                rememberMeCheckbox.checked = true;
            }

            form.addEventListener("submit", function (event) {
                event.preventDefault(); // Zatrzymanie domyślnej akcji formularza

                const login = loginInput.value.trim();
                const haslo = document.getElementById("haslo").value.trim();

                if (rememberMeCheckbox.checked) {
                    localStorage.setItem("login", login);  // Zapisywanie loginu w localStorage
                } else {
                    localStorage.removeItem("login");  // Usuwanie loginu z localStorage, jeśli checkbox jest niezaznaczony
                }

                // Wysłanie zapytania do backendu
                fetch('/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ login, haslo })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.message === "Zalogowano pomyślnie!") {
                        // Jeśli logowanie pomyślne
                        showPopup("Zalogowano pomyślnie!", function () {
                            window.location.href = "index.html";
                        });
                    } else {
                        // Jeśli błąd
                        showPopup(data.error);
                    }
                })
                .catch(error => {
                    showPopup("Wystąpił błąd połączenia z serwerem.");
                });
            });

            // Funkcja do wyświetlania popupu
            function showPopup(message, callback) {
                let popup = document.createElement("div");
                popup.innerHTML = `
                    <div class="popup-overlay">
                        <div class="popup-content">
                            <p>${message}</p>
                            <button id="closePopup">OK</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(popup);

                document.getElementById("closePopup").addEventListener("click", function () {
                    popup.remove();
                    if (callback) callback();
                });
            }
        });
    </script>
</body>
</html>
