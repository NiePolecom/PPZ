<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .back-button {
            position: absolute;
            top: 10px;
            right: 10px;
        }
        .back-button a {
            text-decoration: none;
            color: #007BFF;
            font-weight: bold;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
        }
        .form-group input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        .form-group button {
            width: 100%;
            padding: 10px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .form-group button:hover {
            background-color: #0056b3;
        }
        .error {
            color: red;
            font-size: 14px;
            margin-top: 5px;
        }

        /* Popup styles */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .popup-content {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        #closePopup {
            padding: 10px 20px;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="back-button">
        <a href="index.html">Powrót</a>
    </div>
    <div class="container">
        <h2>Rejestracja</h2>
        <form id="registerForm">
            <div class="form-group">
                <label for="login">Nazwa użytkownika</label>
                <input type="text" id="login" name="login" required>
            </div>
            <div class="form-group">
                <label for="haslo">Hasło</label>
                <input type="password" id="haslo" name="haslo" required>
            </div>
            <div class="form-group">
                <label for="phaslo">Powtórz hasło</label>
                <input type="password" id="phaslo" name="phaslo" required>
                <div class="error" id="error-message"></div>
            </div>
            <div class="form-group">
                <button type="submit">Zarejestruj się</button>
            </div>
        </form>
    </div>  

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const form = document.getElementById("registerForm");
            const errorMessage = document.getElementById("error-message");

            form.addEventListener("submit", function (event) {
                event.preventDefault(); // Zatrzymanie domyślnego działania formularza

                const login = document.getElementById("login").value.trim();
                const haslo = document.getElementById("haslo").value.trim();
                const phaslo = document.getElementById("phaslo").value.trim();

                // Sprawdzanie, czy hasła są zgodne
                if (haslo !== phaslo) {
                    errorMessage.textContent = "Hasła się nie zgadzają!";
                    return;
                }

                // Logika rejestracji (symulacja sukcesu lub błędu)
                showPopup("Rejestracja zakończona sukcesem!", function() {
                    // Opcjonalnie: możesz przekierować użytkownika po sukcesie
                    window.location.href = "index.html";
                });

            });

            // Funkcja do wyświetlania popupu
            function showPopup(message, callback) {
                let popup = document.createElement("div");
                popup.innerHTML = `
                    <div class="popup-overlay">
                        <div class="popup-content">
                            <p>${message}</p>
                            <button id="closePopup">OK</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(popup);

                document.getElementById("closePopup").addEventListener("click", function () {
                    popup.remove();
                    if (callback) callback();
                });
            }
        });
    </script>
</body>
</html>
